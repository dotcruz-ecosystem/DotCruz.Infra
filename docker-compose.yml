services:
    dotcruz-postgres:
        image: postgres:18 # Versão major fixada
        container_name: dotcruz-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_AUTH_NAME}
            POSTGRES_USER: ${DB_AUTH_USER}
            POSTGRES_PASSWORD: ${DB_AUTH_PASS}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        deploy:
            resources:
                limits:
                    memory: 512M
        networks:
            - dotcruz_net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_AUTH_USER} -d ${DB_AUTH_NAME}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    dotcruz-mongo:
        image: mongo:8 # Versão major fixada
        container_name: dotcruz-mongodb
        restart: unless-stopped
        command: mongod --wiredTigerCacheSizeGB 0.25
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MG_DB_USER}
            MONGO_INITDB_ROOT_PASSWORD: ${MG_DB_PASS}
        ports:
            - "27017:27017"
        volumes:
            - mongodb_data:/data/db
        deploy:
            resources:
                limits:
                    memory: 512M
        networks:
            - dotcruz_net
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    dotcruz_net:
        name: dotcruz_net
        external: true

volumes:
    postgres_data:
    mongodb_data:

